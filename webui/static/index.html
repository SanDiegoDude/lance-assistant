<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lance Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- marked.js for rendering assistant markdown (code fences, lists, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <!-- DOMPurify so we can trust ourselves to render arbitrary markdown -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <!-- highlight.js for syntax-highlighted code fences -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/go.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 220ms ease-out both; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .blink { animation: blink 1s steps(2, start) infinite; }

    /* Markdown bubble styles */
    .prose-chat p { margin: 0.35rem 0; }
    .prose-chat p:first-child { margin-top: 0; }
    .prose-chat p:last-child  { margin-bottom: 0; }
    .prose-chat ul, .prose-chat ol { margin: 0.4rem 0; padding-left: 1.25rem; }
    .prose-chat li { margin: 0.15rem 0; }
    .prose-chat code { background: #1f2026; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.85em; }
    .prose-chat pre { margin: 0.6rem 0; }
    .prose-chat pre code {
      display: block; padding: 0.85rem 1rem; background: #0d0e12; border: 1px solid #26262e;
      border-radius: 10px; font-size: 0.82rem; line-height: 1.45; overflow-x: auto;
    }
    .prose-chat h1, .prose-chat h2, .prose-chat h3 { font-weight: 600; margin: 0.6rem 0 0.3rem; }
    .prose-chat h1 { font-size: 1.05rem; }
    .prose-chat h2 { font-size: 1.0rem; }
    .prose-chat h3 { font-size: 0.95rem; }
    .prose-chat blockquote { border-left: 3px solid #3f3f47; padding-left: 0.7rem; color: #c4c4cc; margin: 0.4rem 0; }
    .prose-chat a { color: #a78bfa; text-decoration: underline; text-underline-offset: 2px; }
    .prose-chat table { border-collapse: collapse; margin: 0.5rem 0; }
    .prose-chat th, .prose-chat td { border: 1px solid #2a2a32; padding: 0.3rem 0.55rem; font-size: 0.85rem; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: { 0: "#0a0a0c", 1: "#111114", 2: "#16161a", 3: "#1c1c22" },
            line: "#26262e",
            txt: { 0: "#f5f5f7", 1: "#c4c4cc", 2: "#888892" },
            brand:  "#a78bfa",
            brand2: "#7c3aed",
            ok:     "#34d399",
            warn:   "#fbbf24",
            err:    "#f87171",
            info:   "#60a5fa",
          },
        },
      },
    };
  </script>
</head>
<body class="bg-bg-0 text-txt-0 h-full overflow-hidden font-sans">
  <div id="root" class="h-full"></div>
  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.22.0";
    import { useState, useEffect, useRef, useCallback, useMemo } from "https://esm.sh/preact@10.22.0/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    // -------------------- Markdown --------------------
    // Configure marked + highlight.js
    if (window.marked && window.hljs) {
      // Defer highlight to a manual pass per code block.
      window.marked.setOptions({ gfm: true, breaks: false });
    }

    function renderMarkdown(text) {
      if (!window.marked) return text;
      const raw = window.marked.parse(text || "");
      const clean = window.DOMPurify ? window.DOMPurify.sanitize(raw) : raw;
      return clean;
    }

    function MarkdownBubble({ text, className }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const blocks = ref.current.querySelectorAll("pre code");
        blocks.forEach(b => {
          try { if (window.hljs && !b.dataset.hl) { window.hljs.highlightElement(b); b.dataset.hl = "1"; } } catch (_) {}
        });
      }, [text]);
      return html`<div ref=${ref}
        class=${"prose-chat text-sm leading-relaxed text-txt-0 " + (className || "")}
        dangerouslySetInnerHTML=${{ __html: renderMarkdown(text) }} />`;
    }

    // -------------------- Helpers --------------------

    function classNames(...xs) { return xs.filter(Boolean).join(" "); }

    function formatElapsed(s) {
      if (s == null) return "";
      if (s < 60) return `${s.toFixed(1)}s`;
      const m = Math.floor(s / 60);
      const r = (s % 60).toFixed(0);
      return `${m}m ${r}s`;
    }

    const TOOL_LABEL = {
      generate_image: "Generating image…",
      generate_video: "Generating video…",
      edit_image:     "Editing image…",
      edit_video:     "Editing video…",
      // native fallback task names
      t2i:        "Generating image…",
      t2v:        "Generating video…",
      image_edit: "Editing image…",
      video_edit: "Editing video…",
      x2t_image:  "Reading image…",
      x2t_video:  "Watching video…",
    };
    const TOOL_HINT = {
      generate_image: "~2 min on a single H100/GB10 at 768²",
      generate_video: "Video gen is slow — 192p ≈ 3 min, 360p ≈ 8 min, 480p ≈ 26 min",
      edit_image:     "~1 min — identity preserved through the edit",
      edit_video:     "Video edit is slow (similar timing to T2V)",
      t2i: "~2 min at 768²",
      t2v: "Slow: 192p≈3min, 480p≈26min",
      image_edit: "~1 min",
      video_edit: "Slow",
    };

    function MediaBlock({ kind, url, filename, onUseAsInput }) {
      const isImg = kind === "image";
      return html`
        <div class="space-y-1.5">
          ${isImg
            ? html`<img src=${url} class="max-w-full rounded-xl border border-line shadow-lg max-h-[60vh]" alt="generated"/>`
            : html`<video src=${url} controls loop class="max-w-full rounded-xl border border-line shadow-lg max-h-[60vh]"/>`}
          <div class="flex items-center gap-2 text-[11px] text-txt-2">
            ${onUseAsInput ? html`
              <button onClick=${onUseAsInput}
                class="px-2 py-1 rounded-md border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
                ↻ Use as input for next message
              </button>` : null}
            <a href=${url} download=${filename || ""}
              class="px-2 py-1 rounded-md border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
              ⬇ Download
            </a>
            ${filename ? html`<span class="font-mono">${filename}</span>` : null}
          </div>
        </div>`;
    }

    function ToolBubble({ b, onUseAsInput, onCancelJob }) {
      // Tick the displayed elapsed locally so the bubble stays alive
      // between server events.
      const [tick, setTick] = useState(0);
      useEffect(() => {
        if (b.status === "running" || b.status === "queued") {
          const id = setInterval(() => setTick(t => t + 1), 500);
          return () => clearInterval(id);
        }
      }, [b.status]);

      const label = TOOL_LABEL[b.name] || b.name;
      const hint  = TOOL_HINT[b.name];
      const inner = b.kind_inner || (b.media_url ? (b.media_url.endsWith(".mp4") ? "video" : "image") : null);
      const status = b.status || (b.media_url ? "done" : "running");

      // Compute live elapsed for running jobs
      let elapsed = b.elapsed;
      if (b.startedAt && (status === "running")) {
        elapsed = (Date.now() - b.startedAt) / 1000;
      } else if (status === "queued") {
        elapsed = null;  // don't show elapsed for queued
      }
      void tick;  // referenced just to register the dep

      const statusColor =
        status === "done"      ? "border-brand/30 bg-brand/5"
      : status === "error"     ? "border-err/40 bg-err/5"
      : status === "cancelled" ? "border-warn/40 bg-warn/5"
      : status === "queued"    ? "border-warn/30 bg-warn/5"
      :                          "border-info/40 bg-info/5";

      return html`
        <div class=${"rounded-xl border " + statusColor + " p-2.5 space-y-1.5"}>
          <div class="flex items-center gap-2 text-[11px] uppercase tracking-wider text-txt-2">
            <span class=${
              "inline-block w-1.5 h-1.5 rounded-full " +
              (status === "done"      ? "bg-brand"
              : status === "error"    ? "bg-err"
              : status === "cancelled" ? "bg-warn"
              : status === "queued"    ? "bg-warn pulse-dot"
              :                          "bg-info pulse-dot")
            }></span>
            <span>
              ${status === "queued" ? "⏳ Queued: " : status === "running" ? "" : status === "done" ? "" : status === "cancelled" ? "Cancelled: " : ""}
              ${label}
            </span>
            ${elapsed != null ? html`<span>· ${formatElapsed(elapsed)}</span>` : null}
            ${hint && (status === "queued" || status === "running") ? html`<span class="text-txt-2 hidden md:inline">· ${hint}</span>` : null}
            ${b.job_id ? html`<span class="font-mono text-[10px] ml-auto text-txt-2">${b.job_id.slice(0, 10)}</span>` : null}
            ${(status === "queued" || status === "running") && b.job_id && onCancelJob ? html`
              <button onClick=${() => onCancelJob(b.job_id)}
                class="ml-2 text-[10px] px-1.5 py-0.5 rounded border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
                cancel
              </button>` : null}
          </div>
          ${b.args && (b.args.prompt || b.args.instruction) ? html`
            <div class="text-xs text-txt-1 italic">"${b.args.prompt || b.args.instruction}"</div>` : null}
          ${b.error ? html`
            <div class="text-xs text-err whitespace-pre-wrap break-words">${b.error}</div>` : null}
          ${b.text && !b.media_url ? html`
            <div class="text-sm"><${MarkdownBubble} text=${b.text} /></div>` : null}
          ${b.media_url ? html`
            <${MediaBlock} kind=${inner} url=${b.media_url} filename=${b.media_filename}
              onUseAsInput=${onUseAsInput ? () => onUseAsInput(b) : null} />` : null}
        </div>`;
    }

    // -------------------- Hook: useChat --------------------
    //
    // Event-driven, non-blocking. POST /messages returns 202; all output
    // arrives via a persistent SSE on /events. Background jobs land in the
    // chat whenever they complete, even if the user has already moved on.

    function useChat() {
      const [convId, setConvId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [activeJobs, setActiveJobs] = useState({});         // job_id -> {status, tool, prompt, started_at}
      const [pendingAttachment, setPendingAttachment] = useState(null);
      const [busy, setBusy] = useState(false);                  // POST in-flight only
      const [streaming, setStreaming] = useState(false);        // orchestrator is generating
      const [health, setHealth] = useState(null);

      const cursorRef = useRef(0);       // last event seq applied
      const esRef     = useRef(null);    // EventSource handle
      const convIdRef = useRef(null);

      // ---- Health / orchestrator probe (polled) ----
      useEffect(() => {
        let cancelled = false;
        async function tick() {
          try {
            const r = await fetch("/api/health");
            const j = await r.json();
            if (!cancelled) setHealth(j);
          } catch (_) {}
        }
        tick();
        const id = setInterval(tick, 8000);
        return () => { cancelled = true; clearInterval(id); };
      }, []);

      // ---- Helpers to mutate the rendered message list ----
      const setMessagesAt = useCallback((index, patchFn) => {
        setMessages(prev => prev.map((m, i) => i === index ? patchFn(m) : m));
      }, []);

      const upsertJobBlock = useCallback((jobId, patch) => {
        setMessages(prev => {
          const next = prev.slice();
          // Walk backwards — the placeholder is almost always in the most recent message
          for (let i = next.length - 1; i >= 0; i--) {
            const m = next[i];
            if (m.role !== "assistant" && m.role !== "tool" && m.role !== "system") continue;
            if (!m.blocks) continue;
            const idx = m.blocks.findIndex(b => b.kind === "tool" && b.job_id === jobId);
            if (idx >= 0) {
              const newBlocks = m.blocks.slice();
              newBlocks[idx] = { ...newBlocks[idx], ...patch };
              next[i] = { ...m, blocks: newBlocks };
              return next;
            }
          }
          return next;
        });
      }, []);

      // ---- Apply one event from the bus ----
      const applyEvent = useCallback((ev) => {
        const { seq, type, payload } = ev;
        if (typeof seq === "number") cursorRef.current = Math.max(cursorRef.current, seq);

        if (type === "message_appended") {
          // payload: {role, index, display_blocks, created_at}
          const m = displayBlocksToMessage(payload.role, payload.display_blocks, payload.created_at);
          setMessages(prev => [...prev, m]);
        } else if (type === "text_delta") {
          setStreaming(true);
          setMessages(prev => {
            // Find last assistant message that's "open" (streaming text accumulating
            // before message_appended is emitted at end of turn would mean: orchestrator
            // is mid-response, not yet committed). We render an ephemeral streaming
            // bubble keyed by turn_id.
            const turnId = payload.turn_id;
            const idx = prev.findIndex(m => m.role === "assistant_streaming" && m.turnId === turnId);
            if (idx >= 0) {
              const m = prev[idx];
              const newText = (m.streamingText || "") + (payload.delta || "");
              const newM = { ...m, streamingText: newText };
              const next = prev.slice();
              next[idx] = newM;
              return next;
            }
            return [...prev, {
              id: `streaming-${turnId}`,
              role: "assistant_streaming",
              turnId,
              streamingText: payload.delta || "",
            }];
          });
        } else if (type === "tool_call") {
          // Optional: render a "calling X..." chip. We keep it light — the
          // next event (tool_result with queued status) will give us a full
          // job placeholder we can render properly.
        } else if (type === "tool_result") {
          // The orchestrator received the tool's reply. For generation tools
          // this is `{job_id, status: queued}`; the actual completion will
          // come later as job_completed. For read-only tools it's the
          // result data itself.
          const r = payload.result || {};
          if (payload.kind === "queued" && payload.job_id) {
            // Add the job to the active map; the placeholder bubble will be
            // attached to the next assistant message via message_appended,
            // but we also want to show it inline immediately so add a synthetic
            // pending-jobs banner if no assistant message yet.
            setActiveJobs(prev => ({
              ...prev,
              [payload.job_id]: {
                job_id: payload.job_id, tool: payload.name,
                args: {}, status: "queued", started_at: Date.now() / 1000,
              },
            }));
          }
        } else if (type === "job_queued") {
          setActiveJobs(prev => ({
            ...prev,
            [payload.job_id]: {
              ...prev[payload.job_id],
              job_id: payload.job_id, tool: payload.tool,
              prompt: payload.prompt, args: payload.args || {},
              status: "queued",
              created_at: Date.now() / 1000,
            },
          }));
          upsertJobBlock(payload.job_id, {
            status: "queued",
            name: payload.tool,
            args: payload.args || {},
            prompt: payload.prompt,
          });
        } else if (type === "job_started") {
          setActiveJobs(prev => ({
            ...prev,
            [payload.job_id]: {
              ...(prev[payload.job_id] || {}),
              status: "running",
              started_at: Date.now() / 1000,
            },
          }));
          upsertJobBlock(payload.job_id, {
            status: "running",
            startedAt: Date.now(),
            elapsed: 0,
          });
        } else if (type === "job_completed") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          const r = payload.result || {};
          const asset = payload.asset || {};
          upsertJobBlock(payload.job_id, {
            status: "done",
            elapsed: payload.elapsed,
            media_url: r.media_url || asset.url || "",
            media_filename: r.media_filename || asset.filename || "",
            kind_inner: r.kind || asset.kind,
            asset_id: payload.asset_id,
            text: r.kind === "text" ? r.text : undefined,
          });
        } else if (type === "job_failed") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          upsertJobBlock(payload.job_id, {
            status: "error",
            error: payload.error,
          });
        } else if (type === "job_cancelled") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          upsertJobBlock(payload.job_id, {
            status: "cancelled",
          });
        } else if (type === "turn_started") {
          // no-op (we already cleared streaming on text_delta)
        } else if (type === "turn_ended") {
          setStreaming(false);
          // Drop any stale streaming bubble whose turnId matches — its text
          // will already be present on the committed assistant message
          // (message_appended fires before turn_ended for each round).
          setMessages(prev => prev.filter(m =>
            !(m.role === "assistant_streaming" && m.turnId === payload.turn_id)
          ));
        } else if (type === "error") {
          setStreaming(false);
          setMessages(prev => [...prev, {
            id: `err-${Date.now()}`,
            role: "system",
            blocks: [{ kind: "text", text: `_Error: ${payload.message}_` }],
            error: true,
          }]);
        }
      }, [upsertJobBlock]);

      // ---- Connect the persistent SSE for a conversation ----
      const connect = useCallback((cid, fromSeq) => {
        // Tear down any prior connection
        if (esRef.current) { try { esRef.current.close(); } catch(_) {} esRef.current = null; }
        if (!cid) return;
        const url = `/api/conversations/${cid}/events?from_seq=${fromSeq || 0}`;
        const es = new EventSource(url);
        es.onmessage = (e) => {
          try { applyEvent(JSON.parse(e.data)); } catch(err) { console.warn("bad sse event", err, e.data); }
        };
        es.onerror = (_e) => {
          // Browser auto-reconnects EventSource; on reconnect the URL still
          // has the original from_seq=0, but the server replays from there
          // and we've already seen them — applyEvent is idempotent on
          // active-jobs / placeholders since they key by id. Could refine
          // by rebuilding the URL with cursorRef on close→retry.
        };
        esRef.current = es;
      }, [applyEvent]);

      // ---- Create or attach to a conversation ----
      const ensureConv = useCallback(async () => {
        if (convIdRef.current) return convIdRef.current;
        const r = await fetch("/api/conversations", { method: "POST" });
        const j = await r.json();
        convIdRef.current = j.conversation_id;
        setConvId(j.conversation_id);
        cursorRef.current = 0;
        connect(j.conversation_id, 0);
        return j.conversation_id;
      }, [connect]);

      const reprobeOrchestrator = useCallback(async () => {
        try {
          const r = await fetch("/api/orchestrator/probe", { method: "POST" });
          const j = await r.json();
          setHealth(prev => prev ? { ...prev, orchestrator: { ...(prev.orchestrator || {}), ...j } } : prev);
        } catch (_) {}
      }, []);

      // ---- Submit a user message (non-blocking POST) ----
      const submit = useCallback(async ({ prompt, mode, useOrchestrator }) => {
        if (busy) return;
        if (!prompt && !pendingAttachment) return;
        setBusy(true);
        try {
          const cid = await ensureConv();
          const form = new FormData();
          form.append("prompt", prompt || "");
          form.append("mode", mode);
          form.append("use_orchestrator", String(!!useOrchestrator));
          if (pendingAttachment?.file) {
            form.append("attachment", pendingAttachment.file, pendingAttachment.name);
          }
          setPendingAttachment(null);
          const res = await fetch(`/api/conversations/${cid}/messages`, {
            method: "POST", body: form,
          });
          if (!res.ok) {
            const text = await res.text();
            applyEvent({ seq: -1, type: "error", payload: { message: `HTTP ${res.status}: ${text}` } });
          }
          // Output flows through the SSE — nothing else to do here.
        } catch (e) {
          applyEvent({ seq: -1, type: "error", payload: { message: e.message || String(e) } });
        } finally {
          setBusy(false);
        }
      }, [busy, pendingAttachment, ensureConv, applyEvent]);

      const setAttachmentFromFile = useCallback((file) => {
        if (!file) { setPendingAttachment(null); return; }
        const kind = file.type.startsWith("image/") ? "image"
                    : file.type.startsWith("video/") ? "video"
                    : (/\.(png|jpe?g|webp|gif|bmp)$/i.test(file.name) ? "image"
                        : (/\.(mp4|mov|webm|avi|mkv)$/i.test(file.name) ? "video" : null));
        if (!kind) { alert("Please attach an image or video."); return; }
        const previewUrl = URL.createObjectURL(file);
        setPendingAttachment({ file, name: file.name, kind, previewUrl });
      }, []);

      const reattachFromUrl = useCallback(async (mediaUrl, filename, kind) => {
        try {
          const r = await fetch(mediaUrl);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const blob = await r.blob();
          const file = new File([blob], filename || "media", { type: blob.type });
          setAttachmentFromFile(file);
        } catch (e) {
          alert(`Re-attach failed: ${e.message}`);
        }
      }, [setAttachmentFromFile]);

      const cancelJob = useCallback(async (jobId) => {
        if (!convIdRef.current) return;
        try {
          await fetch(`/api/conversations/${convIdRef.current}/jobs/${jobId}/cancel`, { method: "POST" });
        } catch(_) {}
      }, []);

      const newChat = useCallback(() => {
        if (esRef.current) { try { esRef.current.close(); } catch(_) {} esRef.current = null; }
        setMessages([]);
        setConvId(null);
        convIdRef.current = null;
        cursorRef.current = 0;
        setActiveJobs({});
        setPendingAttachment(null);
        setStreaming(false);
      }, []);

      useEffect(() => () => { if (esRef.current) try { esRef.current.close(); } catch(_) {} }, []);

      return {
        convId, messages, busy, streaming, health, activeJobs,
        pendingAttachment, setAttachmentFromFile, setPendingAttachment,
        reattachFromUrl, submit, newChat, reprobeOrchestrator, cancelJob,
      };
    }

    // Translate a list of server `display_blocks` into the renderer's
    // message shape. We try to keep them as similar as possible — the
    // renderer accepts {kind:"text"|"image"|"video"|"tool"|"tool_error"}.
    function displayBlocksToMessage(role, displayBlocks, createdAt) {
      const id = `m-${role}-${createdAt}-${Math.random().toString(36).slice(2,7)}`;
      const blocks = (displayBlocks || []).map(b => {
        if (b.kind === "text") return { kind: "text", text: b.text };
        if (b.kind === "image") return { kind: "image", url: b.media_url, filename: b.filename || "" };
        if (b.kind === "video") return { kind: "video", url: b.media_url, filename: b.filename || "" };
        if (b.kind === "tool_result") {
          return {
            kind: "tool",
            job_id: b.job_id,
            tool_call_id: b.tool_call_id,
            name: b.name,
            args: b.args || {},
            status: b.status || (b.media_url ? "done" : "running"),
            elapsed: b.elapsed || 0,
            media_url: b.media_url,
            media_filename: b.media_filename,
            kind_inner: b.kind_inner,
            text: b.text,
            error: b.error,
          };
        }
        if (b.kind === "tool_error") {
          return { kind: "tool", name: b.name, status: "error", error: b.error };
        }
        return null;
      }).filter(Boolean);
      return { id, role, blocks, created_at: createdAt };
    }

    // -------------------- Components --------------------

    function HealthPill({ info, onReprobe }) {
      const orchOk = info?.orchestrator?.reachable;
      const modelLoaded = info?.ready;
      const orchTxt = !info
        ? "checking…"
        : orchOk
          ? `orchestrator: ${info.orchestrator.model || "model"} ✓`
          : "orchestrator: offline — native mode";
      const lanceTxt = modelLoaded
        ? "Lance: loaded"
        : (info?.queue_depth ? `Lance: loading (${info.queue_depth} queued)` : "Lance: cold (loads on 1st request)");
      return html`
        <div class="flex items-center gap-2">
          <button onClick=${onReprobe}
            class=${"px-2.5 py-1 rounded-full text-[11px] " + (orchOk ? "bg-ok/15 text-ok" : "bg-warn/15 text-warn") + " hover:bg-bg-3 cursor-pointer"}
            title="Click to re-probe the orchestrator">
            <span class=${"inline-block w-1.5 h-1.5 rounded-full mr-1.5 align-middle " + (orchOk ? "bg-ok" : "bg-warn pulse-dot")}></span>
            ${orchTxt}
          </button>
          <div class=${"px-2.5 py-1 rounded-full text-[11px] " + (modelLoaded ? "bg-ok/15 text-ok" : "bg-bg-3 text-txt-2")}>
            <span class=${"inline-block w-1.5 h-1.5 rounded-full mr-1.5 align-middle " + (modelLoaded ? "bg-ok" : "bg-txt-2")}></span>
            ${lanceTxt}
          </div>
        </div>`;
    }

    function ModePill({ value, current, onClick, label, sub }) {
      const active = value === current;
      return html`
        <button onClick=${onClick}
          class=${"px-3 py-1.5 rounded-full border text-xs transition-colors " +
            (active ? "bg-brand/20 border-brand text-txt-0" : "bg-bg-2 border-line text-txt-1 hover:bg-bg-3")}
          title=${sub}>${label}</button>`;
    }

    function UserMessage({ m }) {
      const textBlock = (m.blocks || []).find(b => b.kind === "text");
      const mediaBlock = (m.blocks || []).find(b => b.kind === "image" || b.kind === "video");
      return html`
        <div class="flex justify-end fade-up">
          <div class="max-w-[80%] space-y-2">
            ${mediaBlock ? html`
              <div class="ml-auto w-fit">
                ${mediaBlock.kind === "image"
                  ? html`<img src=${mediaBlock.url} class="max-h-48 rounded-lg border border-line"/>`
                  : html`<video src=${mediaBlock.url} class="max-h-48 rounded-lg border border-line" controls/>`}
                ${mediaBlock.filename ? html`
                  <div class="text-[10px] text-txt-2 mt-1 text-right">${mediaBlock.filename}</div>` : null}
              </div>` : null}
            ${textBlock?.text ? html`
              <div class="bg-brand/10 border border-brand/30 rounded-2xl rounded-br-md px-4 py-2.5 text-sm whitespace-pre-wrap leading-relaxed">
                ${textBlock.text}
              </div>` : null}
          </div>
        </div>`;
    }

    function AssistantStreamingMessage({ m }) {
      return html`
        <div class="flex justify-start fade-up">
          <div class="max-w-[85%] space-y-2 w-full">
            <div class="text-[10px] uppercase tracking-wider text-brand flex items-center gap-2">
              <span class="inline-block w-1.5 h-1.5 rounded-full bg-brand pulse-dot"></span>
              <span>Assistant</span>
            </div>
            <div class="bg-bg-2 border border-line rounded-2xl rounded-bl-md px-4 py-2.5 text-sm">
              ${m.streamingText
                ? html`<${MarkdownBubble} text=${m.streamingText} /><span class="blink text-txt-2">▍</span>`
                : html`<span class="text-txt-2">thinking…</span>`}
            </div>
          </div>
        </div>`;
    }

    function AssistantMessage({ m, onUseAsInput, onCancelJob }) {
      // status is derived from contained tool blocks if any
      const toolBlocks = (m.blocks || []).filter(b => b.kind === "tool");
      const anyError = toolBlocks.some(t => t.status === "error");
      const anyRunning = toolBlocks.some(t => t.status === "running" || t.status === "queued");
      const status = anyError ? "error" : anyRunning ? "running" : "done";

      return html`
        <div class="flex justify-start fade-up">
          <div class="max-w-[85%] space-y-2 w-full">
            <div class=${"text-[10px] uppercase tracking-wider flex items-center gap-2 " +
              (status === "error" ? "text-err" : status === "running" ? "text-brand" : "text-ok")}>
              <span class=${"inline-block w-1.5 h-1.5 rounded-full " +
                  (status === "running" ? "bg-brand pulse-dot"
                : status === "error"    ? "bg-err"
                :                          "bg-ok")}></span>
              <span>Assistant</span>
            </div>

            ${(m.blocks || []).length > 0 ? (m.blocks || []).map((b, i) => {
              if (b.kind === "text") {
                return html`<div key=${i} class="bg-bg-2 border border-line rounded-2xl rounded-bl-md px-4 py-2.5 text-sm">
                  <${MarkdownBubble} text=${b.text} />
                </div>`;
              }
              if (b.kind === "tool") {
                return html`<${ToolBubble} key=${i} b=${b} onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`;
              }
              return null;
            }) : null}
          </div>
        </div>`;
    }

    function ToolMessage({ m, onUseAsInput, onCancelJob }) {
      // A standalone tool message (no associated assistant text). Renders
      // any tool blocks at the assistant level.
      const blocks = (m.blocks || []).filter(b => b.kind === "tool");
      if (blocks.length === 0) return null;
      return html`
        <div class="flex justify-start fade-up">
          <div class="max-w-[85%] space-y-2 w-full">
            ${blocks.map((b, i) =>
              html`<${ToolBubble} key=${i} b=${b} onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`
            )}
          </div>
        </div>`;
    }

    function SystemMessage({ m }) {
      const text = (m.blocks || []).map(b => b.text || "").join("\n");
      return html`
        <div class="flex justify-center fade-up">
          <div class=${"text-xs px-3 py-1.5 rounded-md border " +
              (m.error ? "border-err/30 bg-err/10 text-err" : "border-line bg-bg-2 text-txt-2")}>
            <${MarkdownBubble} text=${text} className="!text-xs" />
          </div>
        </div>`;
    }

    function Composer({ chat }) {
      const fileInputRef = useRef(null);
      const taRef = useRef(null);
      const [prompt, setPrompt] = useState("");
      const [mode, setMode] = useState("auto");
      const [useOrchestrator, setUseOrchestrator] = useState(true);
      const [dragOver, setDragOver] = useState(false);

      useEffect(() => {
        const onPaste = (e) => {
          for (const item of e.clipboardData?.items || []) {
            if (item.kind === "file") {
              chat.setAttachmentFromFile(item.getAsFile());
              break;
            }
          }
        };
        window.addEventListener("paste", onPaste);
        return () => window.removeEventListener("paste", onPaste);
      }, [chat]);

      const onSend = useCallback(() => {
        const p = prompt.trim();
        if (!p && !chat.pendingAttachment) return;
        chat.submit({ prompt: p, mode, useOrchestrator });
        setPrompt("");
        if (taRef.current) taRef.current.style.height = "auto";
      }, [prompt, mode, useOrchestrator, chat]);

      const onKeyDown = useCallback((e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); }
      }, [onSend]);

      const onDrop = (e) => {
        e.preventDefault(); setDragOver(false);
        const file = e.dataTransfer?.files?.[0];
        if (file) chat.setAttachmentFromFile(file);
      };

      useEffect(() => {
        if (taRef.current) {
          taRef.current.style.height = "auto";
          taRef.current.style.height = `${Math.min(taRef.current.scrollHeight, 260)}px`;
        }
      }, [prompt]);

      const orchReachable = chat.health?.orchestrator?.reachable;
      const activeJobCount = Object.keys(chat.activeJobs || {}).length;

      return html`
        <div class="border-t border-line bg-bg-1/95 backdrop-blur-md">
          <div class="max-w-3xl mx-auto px-4 py-3 space-y-2">

            ${chat.pendingAttachment ? html`
              <div class="flex items-center gap-2 bg-bg-2 border border-line rounded-lg p-2">
                ${chat.pendingAttachment.kind === "image"
                  ? html`<img src=${chat.pendingAttachment.previewUrl} class="h-12 w-12 object-cover rounded"/>`
                  : html`<video src=${chat.pendingAttachment.previewUrl} class="h-12 w-12 object-cover rounded"/>`}
                <div class="text-xs text-txt-1 flex-1 truncate">
                  <div class="font-mono truncate">${chat.pendingAttachment.name}</div>
                  <div class="text-txt-2">attached · ${chat.pendingAttachment.kind}</div>
                </div>
                <button onClick=${() => chat.setPendingAttachment(null)}
                  class="text-txt-2 hover:text-txt-0 px-2">✕</button>
              </div>` : null}

            <div class="flex items-center flex-wrap gap-1.5">
              <span class="text-[11px] text-txt-2 mr-1">Hint:</span>
              <${ModePill} value="auto" current=${mode} onClick=${() => setMode("auto")} label="Auto" sub="Let the orchestrator decide" />
              <${ModePill} value="text" current=${mode} onClick=${() => setMode("text")} label="Text" sub="Text-only response" />
              <${ModePill} value="image" current=${mode} onClick=${() => setMode("image")} label="Image" sub="Want an image as output" />
              <${ModePill} value="video" current=${mode} onClick=${() => setMode("video")} label="Video" sub="Want a video as output (slow)" />
              <${ModePill} value="understand" current=${mode} onClick=${() => setMode("understand")} label="Understand" sub="Describe / analyze attached media" />

              <div class="flex-1"></div>
              ${orchReachable ? html`
                <label class="flex items-center gap-1 text-[11px] text-txt-2 cursor-pointer">
                  <input type="checkbox" checked=${useOrchestrator}
                    onChange=${e => setUseOrchestrator(e.target.checked)}
                    class="accent-brand"/>
                  Orchestrator
                </label>` : null}
            </div>

            <div class=${classNames(
              "flex items-end gap-2 bg-bg-2 border rounded-2xl p-2",
              dragOver ? "border-brand ring-2 ring-brand/30" : "border-line"
            )}
              onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave=${() => setDragOver(false)}
              onDrop=${onDrop}>

              <button onClick=${() => fileInputRef.current?.click()}
                class="p-2 text-txt-2 hover:text-txt-0" title="Attach image or video (or drag here, or paste)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
              <input ref=${fileInputRef} type="file" class="hidden"
                accept="image/*,video/*"
                onChange=${e => { chat.setAttachmentFromFile(e.target.files?.[0]); e.target.value = ""; }} />

              <textarea ref=${taRef} value=${prompt}
                onInput=${e => setPrompt(e.target.value)}
                onKeyDown=${onKeyDown}
                placeholder=${chat.pendingAttachment
                  ? "Describe what to do with the attached media… (Shift+Enter for newline)"
                  : "Ask, generate, or describe… (Shift+Enter for newline)"}
                rows="1"
                class="flex-1 bg-transparent text-sm text-txt-0 placeholder-txt-2 outline-none resize-none px-2 py-2 leading-relaxed" />

              <button onClick=${onSend}
                disabled=${chat.busy || (!prompt.trim() && !chat.pendingAttachment)}
                class=${classNames(
                  "p-2 rounded-xl transition-colors",
                  chat.busy || (!prompt.trim() && !chat.pendingAttachment)
                    ? "bg-bg-3 text-txt-2 cursor-not-allowed"
                    : "bg-brand text-bg-0 hover:bg-brand2 hover:text-txt-0"
                )}>
                ${chat.busy ? html`
                  <svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" stroke-opacity="0.3"/>
                    <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                  </svg>`
                  : html`
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>`}
              </button>
            </div>

            <div class="text-[10px] text-txt-2 px-2 flex items-center flex-wrap gap-2">
              <span>Enter to send · Shift+Enter for newline · drag-and-drop or paste files</span>
              ${activeJobCount > 0 ? html`<span class="text-info">· ${activeJobCount} job${activeJobCount === 1 ? "" : "s"} running in background — chat away</span>` : null}
              ${!orchReachable && chat.health ? html`<span class="text-warn">· orchestrator offline → using Lance-native dispatch</span>` : null}
            </div>
          </div>
        </div>`;
    }

    function EmptyState({ orchOk, onPick }) {
      const ideas = orchOk
        ? [
            { icon: "🖼", label: "Draw a cinematic shot of a desert at golden hour, ultrawide", mode: "auto" },
            { icon: "🎬", label: "Generate a 3-second video of a pastel hot-air balloon over snowy peaks", mode: "auto" },
            { icon: "💬", label: "What can you do?", mode: "auto" },
            { icon: "🔎", label: "Attach an image and ask 'what is this?'", mode: "auto" },
          ]
        : [
            { icon: "🖼", label: "Draw a cinematic shot of a desert at golden hour", mode: "image" },
            { icon: "🎬", label: "A pastel hot-air balloon drifting over snowy peaks", mode: "video" },
            { icon: "🔎", label: "Describe what you see (attach an image first)", mode: "understand" },
            { icon: "✏️", label: "Make it night-time with neon lights (attach an image)", mode: "image" },
          ];
      return html`
        <div class="h-full flex flex-col items-center justify-center text-center px-6">
          <div class="w-14 h-14 rounded-2xl bg-brand/10 border border-brand/30 flex items-center justify-center mb-4">
            <span class="text-2xl">🪶</span>
          </div>
          <h1 class="text-2xl font-semibold text-txt-0 mb-1">Lance Assistant</h1>
          <p class="text-sm text-txt-2 mb-2 max-w-md">
            A unified multimodal model — generate images and video, edit either,
            and reason about media you attach.
          </p>
          <p class="text-[11px] text-txt-2 mb-8 max-w-md">
            ${orchOk
              ? "Driven by your local orchestrator VLM. It chats with you and calls Lance whenever you need new pixels."
              : "Orchestrator offline — falling back to Lance-native dispatch. Pick a mode pill to choose the task explicitly."}
          </p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2 w-full max-w-2xl">
            ${ideas.map(i => html`
              <button onClick=${() => onPick(i)}
                class="text-left px-4 py-3 rounded-xl border border-line bg-bg-2 hover:bg-bg-3 transition-colors">
                <span class="mr-2">${i.icon}</span>
                <span class="text-sm text-txt-1">${i.label}</span>
              </button>`)}
          </div>
        </div>`;
    }

    function ActiveJobsBanner({ activeJobs, onCancel }) {
      const items = Object.values(activeJobs || {});
      if (items.length === 0) return null;
      return html`
        <div class="max-w-3xl mx-auto px-4 pt-3">
          <div class="rounded-lg border border-info/30 bg-info/5 p-2 text-[11px] text-txt-1">
            <div class="text-txt-2 uppercase tracking-wider text-[10px] mb-1">
              ${items.length} background job${items.length === 1 ? "" : "s"} running — you can keep chatting
            </div>
            ${items.map(j => html`
              <div class="flex items-center gap-2 py-0.5">
                <span class=${"inline-block w-1.5 h-1.5 rounded-full " +
                    (j.status === "running" ? "bg-info pulse-dot" : "bg-warn pulse-dot")}></span>
                <span class="text-txt-1">${TOOL_LABEL[j.tool] || j.tool}</span>
                ${j.prompt ? html`<span class="text-txt-2 truncate italic">"${(j.prompt || "").slice(0, 60)}"</span>` : null}
                <span class="font-mono text-[10px] text-txt-2 ml-auto">${(j.job_id || "").slice(0, 10)}</span>
                <button onClick=${() => onCancel(j.job_id)}
                  class="text-[10px] px-1.5 py-0.5 rounded border border-line bg-bg-2 hover:bg-bg-3">
                  cancel
                </button>
              </div>`)}
          </div>
        </div>`;
    }

    function App() {
      const chat = useChat();
      const scrollRef = useRef(null);

      useEffect(() => {
        if (!scrollRef.current) return;
        const el = scrollRef.current;
        // Only auto-scroll if user is near the bottom; respect their scroll
        // position so they can review while a job runs in the background.
        const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 200;
        if (nearBottom) {
          el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
        }
      }, [chat.messages.length, chat.messages.map(m => m.blocks?.length || 0).join(",")]);

      const onUseAsInput = useCallback((toolBlock) => {
        if (!toolBlock.media_url) return;
        chat.reattachFromUrl(toolBlock.media_url, toolBlock.media_filename, toolBlock.kind_inner);
      }, [chat]);

      const onCancelJob = useCallback((jobId) => { chat.cancelJob(jobId); }, [chat]);

      const orchOk = chat.health?.orchestrator?.reachable;

      // Render in chronological order; collapse standalone tool messages
      // into the closest preceding assistant message so the UI doesn't
      // show empty "Assistant" headers for back-fillable tool placeholders.
      const renderedMessages = useMemo(() => {
        const out = [];
        for (const m of chat.messages) {
          if (m.role === "tool") {
            // Merge into the most recent assistant message if it has no
            // text/tool blocks for this same job. Otherwise render as its
            // own "tool" row.
            const prev = out[out.length - 1];
            if (prev && (prev.role === "assistant") && Array.isArray(prev.blocks)) {
              prev.blocks = [...prev.blocks, ...(m.blocks || [])];
              continue;
            }
            out.push({ ...m, role: "tool" });
            continue;
          }
          out.push(m);
        }
        return out;
      }, [chat.messages]);

      return html`
        <div class="h-full flex flex-col">
          <!-- Header -->
          <div class="border-b border-line bg-bg-1/95 backdrop-blur">
            <div class="max-w-3xl mx-auto px-4 py-2.5 flex items-center gap-3">
              <div class="w-7 h-7 rounded-lg bg-brand/20 border border-brand/30 flex items-center justify-center">
                <span class="text-sm">🪶</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-txt-0">Lance Assistant</div>
                <div class="text-[11px] text-txt-2 truncate">
                  ${orchOk
                    ? html`<span>via <span class="font-mono">${chat.health.orchestrator.model}</span> @ ${chat.health.orchestrator.base_url}</span>`
                    : html`<span>ByteDance Lance · 3B unified multimodal</span>`}
                </div>
              </div>
              <button onClick=${chat.newChat}
                class="text-[11px] text-txt-2 hover:text-txt-0 px-2 py-1 border border-line rounded-md hover:bg-bg-3">
                New chat
              </button>
              <${HealthPill} info=${chat.health} onReprobe=${chat.reprobeOrchestrator} />
            </div>
          </div>

          <${ActiveJobsBanner} activeJobs=${chat.activeJobs} onCancel=${onCancelJob} />

          <!-- Messages -->
          <div ref=${scrollRef} class="flex-1 overflow-y-auto">
            <div class="max-w-3xl mx-auto px-4 py-6 space-y-4 min-h-full">
              ${renderedMessages.length === 0
                ? html`<${EmptyState} orchOk=${orchOk} onPick=${(idea) => {
                    chat.submit({ prompt: idea.label, mode: idea.mode, useOrchestrator: orchOk });
                  }} />`
                : renderedMessages.map(m => {
                    if (m.role === "user")                return html`<${UserMessage} key=${m.id} m=${m} />`;
                    if (m.role === "assistant_streaming") return html`<${AssistantStreamingMessage} key=${m.id} m=${m} />`;
                    if (m.role === "assistant")           return html`<${AssistantMessage} key=${m.id} m=${m} onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`;
                    if (m.role === "tool")                return html`<${ToolMessage} key=${m.id} m=${m} onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`;
                    if (m.role === "system")              return html`<${SystemMessage} key=${m.id} m=${m} />`;
                    return null;
                  })}
            </div>
          </div>

          <${Composer} chat=${chat} />
        </div>`;
    }

    render(html`<${App} />`, document.getElementById("root"));
  </script>
</body>
</html>
