<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lance Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- marked.js for rendering assistant markdown (code fences, lists, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <!-- DOMPurify so we can trust ourselves to render arbitrary markdown -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <!-- highlight.js for syntax-highlighted code fences -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/go.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 220ms ease-out both; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .blink { animation: blink 1s steps(2, start) infinite; }

    /* Markdown bubble styles */
    .prose-chat p { margin: 0.35rem 0; }
    .prose-chat p:first-child { margin-top: 0; }
    .prose-chat p:last-child  { margin-bottom: 0; }
    .prose-chat ul, .prose-chat ol { margin: 0.4rem 0; padding-left: 1.25rem; }
    .prose-chat li { margin: 0.15rem 0; }
    .prose-chat code { background: #1f2026; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.85em; }
    .prose-chat pre { margin: 0.6rem 0; }
    .prose-chat pre code {
      display: block; padding: 0.85rem 1rem; background: #0d0e12; border: 1px solid #26262e;
      border-radius: 10px; font-size: 0.82rem; line-height: 1.45; overflow-x: auto;
    }
    .prose-chat h1, .prose-chat h2, .prose-chat h3 { font-weight: 600; margin: 0.6rem 0 0.3rem; }
    .prose-chat h1 { font-size: 1.05rem; }
    .prose-chat h2 { font-size: 1.0rem; }
    .prose-chat h3 { font-size: 0.95rem; }
    .prose-chat blockquote { border-left: 3px solid #3f3f47; padding-left: 0.7rem; color: #c4c4cc; margin: 0.4rem 0; }
    .prose-chat a { color: #a78bfa; text-decoration: underline; text-underline-offset: 2px; }
    .prose-chat table { border-collapse: collapse; margin: 0.5rem 0; }
    .prose-chat th, .prose-chat td { border: 1px solid #2a2a32; padding: 0.3rem 0.55rem; font-size: 0.85rem; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: { 0: "#0a0a0c", 1: "#111114", 2: "#16161a", 3: "#1c1c22" },
            line: "#26262e",
            txt: { 0: "#f5f5f7", 1: "#c4c4cc", 2: "#888892" },
            brand:  "#a78bfa",
            brand2: "#7c3aed",
            ok:     "#34d399",
            warn:   "#fbbf24",
            err:    "#f87171",
            info:   "#60a5fa",
          },
        },
      },
    };
  </script>
</head>
<body class="bg-bg-0 text-txt-0 h-full overflow-hidden font-sans">
  <div id="root" class="h-full"></div>
  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.22.0";
    import { useState, useEffect, useRef, useCallback, useMemo } from "https://esm.sh/preact@10.22.0/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    // -------------------- Markdown --------------------
    // Configure marked + highlight.js
    if (window.marked && window.hljs) {
      // Defer highlight to a manual pass per code block.
      window.marked.setOptions({ gfm: true, breaks: false });
    }

    function renderMarkdown(text) {
      if (!window.marked) return text;
      const raw = window.marked.parse(text || "");
      const clean = window.DOMPurify ? window.DOMPurify.sanitize(raw) : raw;
      return clean;
    }

    function MarkdownBubble({ text, className }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const blocks = ref.current.querySelectorAll("pre code");
        blocks.forEach(b => {
          try { if (window.hljs && !b.dataset.hl) { window.hljs.highlightElement(b); b.dataset.hl = "1"; } } catch (_) {}
        });
      }, [text]);
      return html`<div ref=${ref}
        class=${"prose-chat text-sm leading-relaxed text-txt-0 " + (className || "")}
        dangerouslySetInnerHTML=${{ __html: renderMarkdown(text) }} />`;
    }

    // -------------------- Helpers --------------------

    function classNames(...xs) { return xs.filter(Boolean).join(" "); }

    function formatElapsed(s) {
      if (s == null) return "";
      if (s < 60) return `${s.toFixed(1)}s`;
      const m = Math.floor(s / 60);
      const r = (s % 60).toFixed(0);
      return `${m}m ${r}s`;
    }

    const TOOL_LABEL = {
      generate_image: "Generating image…",
      generate_video: "Generating video…",
      edit_image:     "Editing image…",
      edit_video:     "Editing video…",
      // native fallback task names
      t2i:        "Generating image…",
      t2v:        "Generating video…",
      image_edit: "Editing image…",
      video_edit: "Editing video…",
      x2t_image:  "Reading image…",
      x2t_video:  "Watching video…",
    };
    const TOOL_HINT = {
      generate_image: "Image generation — text-to-image at 768²",
      generate_video: "Video generation — slower than images; scales with resolution and frame count",
      edit_image:     "Image edit — preserves identity through the change",
      edit_video:     "Video edit — slow (similar cost to video generation)",
      t2i: "Image generation at 768²",
      t2v: "Video generation — slow; scales with resolution and frame count",
      image_edit: "Image edit — preserves identity",
      video_edit: "Video edit — slow",
    };

    function MediaBlock({ kind, url, filename, onUseAsInput }) {
      const isImg = kind === "image";
      return html`
        <div class="space-y-1.5">
          ${isImg
            ? html`<img src=${url} class="max-w-full rounded-xl border border-line shadow-lg max-h-[60vh]" alt="generated"/>`
            : html`<video src=${url} controls loop class="max-w-full rounded-xl border border-line shadow-lg max-h-[60vh]"/>`}
          <div class="flex items-center gap-2 text-[11px] text-txt-2">
            ${onUseAsInput ? html`
              <button onClick=${onUseAsInput}
                class="px-2 py-1 rounded-md border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
                ↻ Use as input for next message
              </button>` : null}
            <a href=${url} download=${filename || ""}
              class="px-2 py-1 rounded-md border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
              ⬇ Download
            </a>
            ${filename ? html`<span class="font-mono">${filename}</span>` : null}
          </div>
        </div>`;
    }

    function ToolBubble({ b, onUseAsInput, onCancelJob, compact }) {
      // Tick the displayed elapsed locally so the bubble stays alive
      // between server events.
      const [tick, setTick] = useState(0);
      useEffect(() => {
        if (b.status === "running" || b.status === "queued") {
          const id = setInterval(() => setTick(t => t + 1), 500);
          return () => clearInterval(id);
        }
      }, [b.status]);

      const label = TOOL_LABEL[b.name] || b.name;
      const hint  = TOOL_HINT[b.name];
      const inner = b.kind_inner || (b.media_url ? (b.media_url.endsWith(".mp4") ? "video" : "image") : null);
      const status = b.status || (b.media_url ? "done" : "running");

      // Compute live elapsed for running jobs
      let elapsed = b.elapsed;
      if (b.startedAt && (status === "running")) {
        elapsed = (Date.now() - b.startedAt) / 1000;
      } else if (status === "queued") {
        elapsed = null;  // don't show elapsed for queued
      }
      void tick;  // referenced just to register the dep

      const statusColor =
        status === "done"      ? "border-brand/30 bg-brand/5"
      : status === "error"     ? "border-err/40 bg-err/5"
      : status === "cancelled" ? "border-warn/40 bg-warn/5"
      : status === "queued"    ? "border-warn/30 bg-warn/5"
      :                          "border-info/40 bg-info/5";

      // In "compact" mode we render as a thin one-line chip — used inside
      // the collapsible thinking panel where we just want a trace, not the
      // full tool bubble with prompt/result body.
      if (compact) {
        return html`
          <div class="flex items-center gap-2 text-[10px] text-txt-2 leading-relaxed">
            <span class=${
              "inline-block w-1 h-1 rounded-full " +
              (status === "done"      ? "bg-brand"
              : status === "error"    ? "bg-err"
              : status === "cancelled" ? "bg-warn"
              : status === "queued"    ? "bg-warn pulse-dot"
              :                          "bg-info pulse-dot")
            }></span>
            <span class="font-mono">${label}</span>
            ${elapsed != null ? html`<span>· ${formatElapsed(elapsed)}</span>` : null}
            ${b.error ? html`<span class="text-err truncate">· ${b.error.slice(0, 80)}</span>` : null}
            ${b.text && !b.media_url ? html`
              <span class="italic truncate max-w-xs">"${(b.text || "").slice(0, 120)}"</span>` : null}
          </div>`;
      }

      const pct = (b.progress != null) ? Math.round(b.progress * 100) : null;
      const showProgress = status === "running" && b.total_steps && b.total_steps > 0;

      return html`
        <div class=${"rounded-xl border " + statusColor + " p-2.5 space-y-1.5"}>
          <div class="flex items-center gap-2 text-[11px] uppercase tracking-wider text-txt-2">
            <span class=${
              "inline-block w-1.5 h-1.5 rounded-full " +
              (status === "done"      ? "bg-brand"
              : status === "error"    ? "bg-err"
              : status === "cancelled" ? "bg-warn"
              : status === "queued"    ? "bg-warn pulse-dot"
              :                          "bg-info pulse-dot")
            }></span>
            <span>
              ${status === "queued" ? "⏳ Queued: " : status === "running" ? "" : status === "done" ? "" : status === "cancelled" ? "Cancelled: " : ""}
              ${label}
            </span>
            ${elapsed != null ? html`<span>· ${formatElapsed(elapsed)}</span>` : null}
            ${showProgress ? html`<span>· step ${b.step}/${b.total_steps}</span>` : null}
            ${showProgress && b.eta_seconds != null && b.eta_seconds > 0 ? html`
              <span>· ~${formatElapsed(b.eta_seconds)} left</span>` : null}
            ${hint && (status === "queued" || status === "running") && !showProgress ? html`<span class="text-txt-2 hidden md:inline">· ${hint}</span>` : null}
            ${b.job_id ? html`<span class="font-mono text-[10px] ml-auto text-txt-2">${b.job_id.slice(0, 10)}</span>` : null}
            ${(status === "queued" || status === "running") && b.job_id && onCancelJob ? html`
              <button onClick=${() => onCancelJob(b.job_id)}
                class="ml-2 text-[10px] px-1.5 py-0.5 rounded border border-line bg-bg-2 hover:bg-bg-3 text-txt-1">
                cancel
              </button>` : null}
          </div>
          ${showProgress ? html`
            <div class="h-1 bg-bg-3 rounded overflow-hidden">
              <div class="h-full bg-info transition-all" style=${`width: ${pct}%`}></div>
            </div>` : null}
          ${b.args && (b.args.prompt || b.args.instruction) ? html`
            <div class="text-xs text-txt-1 italic">"${b.args.prompt || b.args.instruction}"</div>` : null}
          ${b.error ? html`
            <div class="text-xs text-err whitespace-pre-wrap break-words">${b.error}</div>` : null}
          ${b.text && !b.media_url ? html`
            <div class="text-sm"><${MarkdownBubble} text=${b.text} /></div>` : null}
          ${b.media_url ? html`
            <${MediaBlock} kind=${inner} url=${b.media_url} filename=${b.media_filename}
              onUseAsInput=${onUseAsInput ? () => onUseAsInput(b) : null} />` : null}
        </div>`;
    }

    // -------------------- Hook: useChat --------------------
    //
    // Event-driven, non-blocking. POST /messages returns 202; all output
    // arrives via a persistent SSE on /events. Background jobs land in the
    // chat whenever they complete, even if the user has already moved on.

    function useChat() {
      const [convId, setConvId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [turns, setTurns] = useState({});                  // turn_id -> {status, startedAt, endedAt, currentTool, streamingText}
      const [activeJobs, setActiveJobs] = useState({});         // job_id -> {status, tool, prompt, started_at}
      const [captions, setCaptions] = useState({});             // asset_id -> {status: "captioning"|"done"|"failed", caption?, error?, elapsed?}
      const [pendingAttachment, setPendingAttachment] = useState(null);
      const [busy, setBusy] = useState(false);                  // POST in-flight only
      const [streaming, setStreaming] = useState(false);        // orchestrator is generating
      const [health, setHealth] = useState(null);
      const [context, setContext] = useState(null);             // {tokens_used, tokens_budget, tokens_total, truncated?}

      const cursorRef    = useRef(0);     // last event seq applied
      const esRef        = useRef(null);  // EventSource handle
      const convIdRef    = useRef(null);
      const currentTurnRef = useRef(null); // most recently started turn_id (helps with stray events)

      // ---- Health / orchestrator probe (polled) ----
      useEffect(() => {
        let cancelled = false;
        async function tick() {
          try {
            const r = await fetch("/api/health");
            const j = await r.json();
            if (!cancelled) setHealth(j);
          } catch (_) {}
        }
        tick();
        const id = setInterval(tick, 8000);
        return () => { cancelled = true; clearInterval(id); };
      }, []);

      // ---- Helpers to mutate the rendered message list ----
      const setMessagesAt = useCallback((index, patchFn) => {
        setMessages(prev => prev.map((m, i) => i === index ? patchFn(m) : m));
      }, []);

      const upsertJobBlock = useCallback((jobId, patch) => {
        setMessages(prev => {
          const next = prev.slice();
          // Walk backwards — the placeholder is almost always in the most recent message
          for (let i = next.length - 1; i >= 0; i--) {
            const m = next[i];
            if (m.role !== "assistant" && m.role !== "tool" && m.role !== "system") continue;
            if (!m.blocks) continue;
            const idx = m.blocks.findIndex(b => b.kind === "tool" && b.job_id === jobId);
            if (idx >= 0) {
              const newBlocks = m.blocks.slice();
              newBlocks[idx] = { ...newBlocks[idx], ...patch };
              next[i] = { ...m, blocks: newBlocks };
              return next;
            }
          }
          return next;
        });
      }, []);

      // ---- Apply one event from the bus ----
      //
      // Events with a `turn_id` are folded into a per-turn state record so
      // the UI can render one visual "turn block" per agentic round-trip,
      // with intermediate text + read-only tool calls collapsed into a
      // "thinking" panel. Generation tool messages and the final voice
      // text stay visible outside the panel.
      const applyEvent = useCallback((ev) => {
        const { seq, type, payload, ts } = ev;
        if (typeof seq === "number") cursorRef.current = Math.max(cursorRef.current, seq);
        // Server timestamp in ms (falls back to client clock on legacy events)
        const eventTs = typeof ts === "number" ? ts * 1000 : Date.now();

        const patchTurn = (turnId, patchFn) => {
          if (!turnId) return;
          setTurns(prev => {
            const cur = prev[turnId] || {};
            const next = patchFn(cur) || cur;
            if (next === cur) return prev;
            return { ...prev, [turnId]: next };
          });
        };

        if (type === "message_appended") {
          // Tag the message with its turn_id and category (if any) so the
          // renderer can group + classify it.
          const m = displayBlocksToMessage(
            payload.role,
            payload.display_blocks,
            payload.created_at,
            { turn_id: payload.turn_id || null,
              category: payload.category || null,
              tool_call_id: payload.tool_call_id || null,
              final: payload.final === true,
            },
          );
          setMessages(prev => [...prev, m]);
          // For assistant messages, drop any in-flight streaming buffer for
          // this turn — its content is now committed in the message.
          if (payload.role === "assistant" && payload.turn_id) {
            patchTurn(payload.turn_id, t => ({ ...t, streamingText: "" }));
          }
        } else if (type === "text_delta") {
          setStreaming(true);
          patchTurn(payload.turn_id, t => ({
            ...t,
            status: t.currentTool ? "working" : "thinking",
            streamingText: (t.streamingText || "") + (payload.delta || ""),
          }));
        } else if (type === "tool_call") {
          // The orchestrator just issued a tool call. Mark the turn as
          // "working" with the tool's pretty name. We don't render a
          // separate bubble here — the message_appended event for the
          // resulting tool message will create the proper block.
          patchTurn(payload.turn_id, t => ({
            ...t,
            status: "working",
            currentTool: payload.name,
            // Reset streaming text so the next round starts fresh
            streamingText: "",
          }));
        } else if (type === "tool_result") {
          patchTurn(payload.turn_id, t => ({ ...t, currentTool: null,
            status: "thinking" }));
          // Update activeJobs for generation tools so the banner picks them up.
          if (payload.kind === "queued" && payload.job_id) {
            setActiveJobs(prev => ({
              ...prev,
              [payload.job_id]: {
                job_id: payload.job_id, tool: payload.name,
                args: {}, status: "queued", started_at: Date.now() / 1000,
              },
            }));
          }
        } else if (type === "job_queued") {
          setActiveJobs(prev => ({
            ...prev,
            [payload.job_id]: {
              ...prev[payload.job_id],
              job_id: payload.job_id, tool: payload.tool,
              prompt: payload.prompt, args: payload.args || {},
              status: "queued",
              created_at: Date.now() / 1000,
            },
          }));
          upsertJobBlock(payload.job_id, {
            status: "queued",
            name: payload.tool,
            args: payload.args || {},
            prompt: payload.prompt,
          });
        } else if (type === "job_started") {
          setActiveJobs(prev => ({
            ...prev,
            [payload.job_id]: {
              ...(prev[payload.job_id] || {}),
              status: "running",
              started_at: Date.now() / 1000,
            },
          }));
          upsertJobBlock(payload.job_id, {
            status: "running",
            startedAt: Date.now(),
            elapsed: 0,
          });
        } else if (type === "job_progress") {
          // Live denoising-step progress from the server's forward hook.
          setActiveJobs(prev => ({
            ...prev,
            [payload.job_id]: {
              ...(prev[payload.job_id] || {}),
              progress: payload.progress,
              progress_note: payload.progress_note,
              step: payload.step,
              total_steps: payload.total_steps,
              eta_seconds: payload.eta_seconds,
            },
          }));
          upsertJobBlock(payload.job_id, {
            progress: payload.progress,
            progress_note: payload.progress_note,
            step: payload.step,
            total_steps: payload.total_steps,
            eta_seconds: payload.eta_seconds,
          });
        } else if (type === "job_completed") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          const r = payload.result || {};
          const asset = payload.asset || {};
          upsertJobBlock(payload.job_id, {
            status: "done",
            elapsed: payload.elapsed,
            media_url: r.media_url || asset.url || "",
            media_filename: r.media_filename || asset.filename || "",
            kind_inner: r.kind || asset.kind,
            asset_id: payload.asset_id,
            text: r.kind === "text" ? r.text : undefined,
          });
        } else if (type === "job_failed") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          upsertJobBlock(payload.job_id, { status: "error", error: payload.error });
        } else if (type === "job_cancelled") {
          setActiveJobs(prev => {
            const { [payload.job_id]: _drop, ...rest } = prev;
            return rest;
          });
          upsertJobBlock(payload.job_id, { status: "cancelled" });
        } else if (type === "turn_started") {
          currentTurnRef.current = payload.turn_id;
          patchTurn(payload.turn_id, () => ({
            turn_id: payload.turn_id,
            mode: payload.mode,
            status: "thinking",
            startedAt: eventTs,
            endedAt: null,
            streamingText: "",
            currentTool: null,
            toolCount: 0,
          }));
        } else if (type === "turn_ended") {
          setStreaming(false);
          patchTurn(payload.turn_id, t => ({
            ...t,
            status: payload.status === "error" ? "error" : "done",
            endedAt: eventTs,
            currentTool: null,
            streamingText: "",
          }));
        } else if (type === "attachment_caption_started") {
          setCaptions(prev => ({
            ...prev,
            [payload.asset_id]: { status: "captioning", kind: payload.kind, filename: payload.filename },
          }));
        } else if (type === "attachment_caption_done") {
          setCaptions(prev => ({
            ...prev,
            [payload.asset_id]: {
              ...(prev[payload.asset_id] || {}),
              status: "done",
              caption: payload.caption || "",
              elapsed: payload.elapsed_seconds || 0,
            },
          }));
        } else if (type === "attachment_caption_failed") {
          setCaptions(prev => ({
            ...prev,
            [payload.asset_id]: {
              ...(prev[payload.asset_id] || {}),
              status: "failed",
              error: payload.error || "",
            },
          }));
        } else if (type === "context_usage") {
          setContext({
            used: payload.tokens_used,
            budget: payload.tokens_budget,
            total: payload.tokens_total,
            truncated: !!payload.truncated,
          });
        } else if (type === "context_truncated") {
          setContext(prev => ({
            ...(prev || {}),
            used: payload.tokens_after,
            budget: payload.tokens_budget,
            total: payload.tokens_total,
            truncated: true,
            droppedMsgs: payload.messages_dropped,
          }));
          setMessages(prev => [...prev, {
            id: `trunc-${Date.now()}`,
            role: "system",
            blocks: [{
              kind: "text",
              text: `_Context window getting full — dropped ${payload.messages_dropped} older message(s) to keep the conversation alive. The orchestrator still sees the system prompt and the recent history._`,
            }],
          }]);
        } else if (type === "error") {
          setStreaming(false);
          if (payload.turn_id) {
            patchTurn(payload.turn_id, t => ({ ...t, status: "error" }));
          }
          setMessages(prev => [...prev, {
            id: `err-${Date.now()}`,
            role: "system",
            blocks: [{ kind: "text", text: `_Error: ${payload.message}_` }],
            error: true,
          }]);
        }
      }, [upsertJobBlock]);

      // ---- Connect the persistent SSE for a conversation ----
      const connect = useCallback((cid, fromSeq) => {
        // Tear down any prior connection
        if (esRef.current) { try { esRef.current.close(); } catch(_) {} esRef.current = null; }
        if (!cid) return;
        const url = `/api/conversations/${cid}/events?from_seq=${fromSeq || 0}`;
        const es = new EventSource(url);
        es.onmessage = (e) => {
          try { applyEvent(JSON.parse(e.data)); } catch(err) { console.warn("bad sse event", err, e.data); }
        };
        es.onerror = (_e) => {
          // Browser auto-reconnects EventSource; on reconnect the URL still
          // has the original from_seq=0, but the server replays from there
          // and we've already seen them — applyEvent is idempotent on
          // active-jobs / placeholders since they key by id. Could refine
          // by rebuilding the URL with cursorRef on close→retry.
        };
        esRef.current = es;
      }, [applyEvent]);

      // ---- Create or attach to a conversation ----
      const ensureConv = useCallback(async () => {
        if (convIdRef.current) return convIdRef.current;
        const r = await fetch("/api/conversations", { method: "POST" });
        const j = await r.json();
        convIdRef.current = j.conversation_id;
        setConvId(j.conversation_id);
        cursorRef.current = 0;
        connect(j.conversation_id, 0);
        return j.conversation_id;
      }, [connect]);

      const reprobeOrchestrator = useCallback(async () => {
        try {
          const r = await fetch("/api/orchestrator/probe", { method: "POST" });
          const j = await r.json();
          setHealth(prev => prev ? { ...prev, orchestrator: { ...(prev.orchestrator || {}), ...j } } : prev);
        } catch (_) {}
      }, []);

      // ---- Submit a user message (non-blocking POST) ----
      const submit = useCallback(async ({ prompt, mode, useOrchestrator }) => {
        if (busy) return;
        if (!prompt && !pendingAttachment) return;
        setBusy(true);
        try {
          const cid = await ensureConv();
          const form = new FormData();
          form.append("prompt", prompt || "");
          form.append("mode", mode);
          form.append("use_orchestrator", String(!!useOrchestrator));
          if (pendingAttachment?.file) {
            form.append("attachment", pendingAttachment.file, pendingAttachment.name);
          }
          setPendingAttachment(null);
          const res = await fetch(`/api/conversations/${cid}/messages`, {
            method: "POST", body: form,
          });
          if (!res.ok) {
            const text = await res.text();
            applyEvent({ seq: -1, type: "error", payload: { message: `HTTP ${res.status}: ${text}` } });
          }
          // Output flows through the SSE — nothing else to do here.
        } catch (e) {
          applyEvent({ seq: -1, type: "error", payload: { message: e.message || String(e) } });
        } finally {
          setBusy(false);
        }
      }, [busy, pendingAttachment, ensureConv, applyEvent]);

      const setAttachmentFromFile = useCallback((file) => {
        if (!file) { setPendingAttachment(null); return; }
        const kind = file.type.startsWith("image/") ? "image"
                    : file.type.startsWith("video/") ? "video"
                    : (/\.(png|jpe?g|webp|gif|bmp)$/i.test(file.name) ? "image"
                        : (/\.(mp4|mov|webm|avi|mkv)$/i.test(file.name) ? "video" : null));
        if (!kind) { alert("Please attach an image or video."); return; }
        const previewUrl = URL.createObjectURL(file);
        setPendingAttachment({ file, name: file.name, kind, previewUrl });
      }, []);

      const reattachFromUrl = useCallback(async (mediaUrl, filename, kind) => {
        try {
          const r = await fetch(mediaUrl);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const blob = await r.blob();
          const file = new File([blob], filename || "media", { type: blob.type });
          setAttachmentFromFile(file);
        } catch (e) {
          alert(`Re-attach failed: ${e.message}`);
        }
      }, [setAttachmentFromFile]);

      const cancelJob = useCallback(async (jobId) => {
        if (!convIdRef.current) return;
        try {
          await fetch(`/api/conversations/${convIdRef.current}/jobs/${jobId}/cancel`, { method: "POST" });
        } catch(_) {}
      }, []);

      const newChat = useCallback(() => {
        if (esRef.current) { try { esRef.current.close(); } catch(_) {} esRef.current = null; }
        setMessages([]);
        setTurns({});
        setConvId(null);
        convIdRef.current = null;
        cursorRef.current = 0;
        currentTurnRef.current = null;
        setActiveJobs({});
        setPendingAttachment(null);
        setStreaming(false);
      }, []);

      useEffect(() => () => { if (esRef.current) try { esRef.current.close(); } catch(_) {} }, []);

      return {
        convId, messages, turns, busy, streaming, health, activeJobs, captions,
        pendingAttachment, setAttachmentFromFile, setPendingAttachment,
        reattachFromUrl, submit, newChat, reprobeOrchestrator, cancelJob,
        context,
      };
    }

    // Translate a list of server `display_blocks` into the renderer's
    // message shape. We try to keep them as similar as possible — the
    // renderer accepts {kind:"text"|"image"|"video"|"tool"|"tool_error"}.
    function displayBlocksToMessage(role, displayBlocks, createdAt, meta) {
      const id = `m-${role}-${createdAt}-${Math.random().toString(36).slice(2,7)}`;
      const blocks = (displayBlocks || []).map(b => {
        if (b.kind === "text") return { kind: "text", text: b.text };
        if (b.kind === "image") return { kind: "image", url: b.media_url, filename: b.filename || "", asset_id: b.asset_id };
        if (b.kind === "video") return { kind: "video", url: b.media_url, filename: b.filename || "", asset_id: b.asset_id };
        if (b.kind === "tool_result") {
          return {
            kind: "tool",
            job_id: b.job_id,
            tool_call_id: b.tool_call_id,
            name: b.name,
            args: b.args || {},
            status: b.status || (b.media_url ? "done" : "running"),
            elapsed: b.elapsed || 0,
            media_url: b.media_url,
            media_filename: b.media_filename,
            kind_inner: b.kind_inner,
            text: b.text,
            error: b.error,
            category: b.category || meta?.category || "readonly",
          };
        }
        if (b.kind === "tool_error") {
          return { kind: "tool", name: b.name, status: "error", error: b.error,
                   category: meta?.category || "readonly" };
        }
        return null;
      }).filter(Boolean);
      const m = { id, role, blocks, created_at: createdAt };
      if (meta) {
        if (meta.turn_id) m.turn_id = meta.turn_id;
        if (meta.category) m.category = meta.category;
        if (meta.tool_call_id) m.tool_call_id = meta.tool_call_id;
        if (meta.final === true) m.final = true;
      }
      return m;
    }

    // -------------------- Components --------------------

    function ContextBadge({ ctx }) {
      if (!ctx || !ctx.budget) return null;
      const used = ctx.used || 0;
      const budget = ctx.budget;
      const pct = Math.min(1, used / budget);
      // Color thresholds: green <60%, yellow 60-85%, orange 85-95%, red >95%
      let color = "bg-ok/15 text-ok";
      let dot = "bg-ok";
      if (pct > 0.95) { color = "bg-err/15 text-err"; dot = "bg-err"; }
      else if (pct > 0.85) { color = "bg-warn/20 text-warn"; dot = "bg-warn pulse-dot"; }
      else if (pct > 0.60) { color = "bg-warn/15 text-warn"; dot = "bg-warn"; }
      const fmt = (n) => n >= 1000 ? `${(n / 1000).toFixed(1)}k` : String(n);
      const title = ctx.truncated
        ? `Context: ${used.toLocaleString()} / ${budget.toLocaleString()} tokens used (oldest history dropped to fit)`
        : `Context: ${used.toLocaleString()} / ${budget.toLocaleString()} tokens used`;
      return html`
        <div class=${"px-2.5 py-1 rounded-full text-[11px] whitespace-nowrap shrink-0 " + color} title=${title}>
          <span class=${"inline-block w-1.5 h-1.5 rounded-full mr-1.5 align-middle " + dot}></span>
          ${fmt(used)} / ${fmt(budget)}${ctx.truncated ? " ⤴" : ""}
        </div>`;
    }

    function HealthPill({ info, onReprobe }) {
      const orchOk = info?.orchestrator?.reachable;
      const modelLoaded = info?.ready;
      // Short visible labels — full info lives in the tooltip so the
      // header stays compact even with very long model names.
      const orchShort = !info ? "…" : orchOk ? "orch" : "native";
      const orchTitle = !info
        ? "checking orchestrator…"
        : orchOk
          ? `orchestrator: ${info.orchestrator.model || "model"} reachable — click to re-probe`
          : "orchestrator: offline — falling back to native Lance dispatch. Click to re-probe.";
      const lanceShort = modelLoaded
        ? "Lance"
        : (info?.queue_depth ? "loading" : "cold");
      const lanceTitle = modelLoaded
        ? "Lance: model loaded on GPU"
        : (info?.queue_depth ? `Lance: loading (${info.queue_depth} request(s) queued)` : "Lance: not loaded yet — loads on the first request");
      return html`
        <div class="flex items-center gap-1.5 shrink-0">
          <button onClick=${onReprobe}
            class=${"px-2 py-1 rounded-full text-[11px] whitespace-nowrap shrink-0 " + (orchOk ? "bg-ok/15 text-ok" : "bg-warn/15 text-warn") + " hover:bg-bg-3 cursor-pointer"}
            title=${orchTitle}>
            <span class=${"inline-block w-1.5 h-1.5 rounded-full mr-1 align-middle " + (orchOk ? "bg-ok" : "bg-warn pulse-dot")}></span>
            ${orchShort}
          </button>
          <div class=${"px-2 py-1 rounded-full text-[11px] whitespace-nowrap shrink-0 " + (modelLoaded ? "bg-ok/15 text-ok" : "bg-bg-3 text-txt-2")}
               title=${lanceTitle}>
            <span class=${"inline-block w-1.5 h-1.5 rounded-full mr-1 align-middle " + (modelLoaded ? "bg-ok" : (info?.queue_depth ? "bg-warn pulse-dot" : "bg-txt-2"))}></span>
            ${lanceShort}
          </div>
        </div>`;
    }

    function ModePill({ value, current, onClick, label, sub }) {
      const active = value === current;
      return html`
        <button onClick=${onClick}
          class=${"px-3 py-1.5 rounded-full border text-xs transition-colors " +
            (active ? "bg-brand/20 border-brand text-txt-0" : "bg-bg-2 border-line text-txt-1 hover:bg-bg-3")}
          title=${sub}>${label}</button>`;
    }

    function UserMessage({ m, captions }) {
      const textBlock = (m.blocks || []).find(b => b.kind === "text");
      const mediaBlock = (m.blocks || []).find(b => b.kind === "image" || b.kind === "video");
      const caption = mediaBlock && mediaBlock.asset_id ? (captions || {})[mediaBlock.asset_id] : null;
      return html`
        <div class="flex justify-end fade-up">
          <div class="max-w-[80%] space-y-2">
            ${mediaBlock ? html`
              <div class="ml-auto w-fit">
                ${mediaBlock.kind === "image"
                  ? html`<img src=${mediaBlock.url} class="max-h-48 rounded-lg border border-line"/>`
                  : html`<video src=${mediaBlock.url} class="max-h-48 rounded-lg border border-line" controls/>`}
                ${mediaBlock.filename ? html`
                  <div class="text-[10px] text-txt-2 mt-1 text-right">${mediaBlock.filename}</div>` : null}
                ${caption ? html`<${CaptionPill} caption=${caption} />` : null}
              </div>` : null}
            ${textBlock?.text ? html`
              <div class="bg-brand/10 border border-brand/30 rounded-2xl rounded-br-md px-4 py-2.5 text-sm whitespace-pre-wrap leading-relaxed">
                ${textBlock.text}
              </div>` : null}
          </div>
        </div>`;
    }

    // Small status pill rendered under an uploaded image/video while the
    // background captioner is working — and a collapsible chevron showing
    // the caption text once it's available. The caption is metadata that
    // gets injected into the orchestrator's prompt; the chevron lets users
    // sanity-check what the agent "saw" without cluttering the chat log.
    function CaptionPill({ caption }) {
      const [open, setOpen] = useState(false);
      if (!caption) return null;
      if (caption.status === "captioning") {
        return html`
          <div class="text-[10px] text-txt-2 mt-1 text-right flex items-center gap-1.5 justify-end">
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-brand pulse-dot"></span>
            captioning attachment…
          </div>`;
      }
      if (caption.status === "failed") {
        return html`
          <div class="text-[10px] text-warn/80 mt-1 text-right" title=${caption.error || ""}>
            caption skipped
          </div>`;
      }
      if (caption.status === "done") {
        const text = (caption.caption || "").trim();
        if (!text) {
          return html`<div class="text-[10px] text-txt-2 mt-1 text-right">no caption</div>`;
        }
        return html`
          <div class="mt-1 text-right">
            <button onClick=${() => setOpen(o => !o)}
              class="text-[10px] text-txt-2 hover:text-txt-1 inline-flex items-center gap-1">
              <span class="inline-block w-1.5 h-1.5 rounded-full bg-ok/70"></span>
              ${open ? "hide" : "show"} auto-caption
            </button>
            ${open ? html`
              <div class="mt-1 text-[11px] text-txt-1 italic bg-bg-2 border border-line rounded-lg px-3 py-1.5 max-w-md text-left">
                ${text}
              </div>` : null}
          </div>`;
      }
      return null;
    }

    // Heuristic: a tool bubble is treated as "visible output" (rendered
    // outside the thinking panel) when it has media or a job_id, or it
    // was explicitly tagged as a generation tool by the server.
    function isVisibleToolBlock(b) {
      if (!b || b.kind !== "tool") return false;
      if (b.category === "generation") return true;
      if (b.job_id) return true;
      if (b.media_url) return true;
      return false;
    }

    function TurnStatusPill({ turn }) {
      const status = turn?.status || "thinking";
      const tool = turn?.currentTool;
      const elapsed = turn?.startedAt
        ? ((turn.endedAt || Date.now()) - turn.startedAt) / 1000
        : 0;
      const label = (() => {
        if (status === "error")    return "Error";
        if (status === "done")     return elapsed > 0.05 ? `Thought for ${elapsed.toFixed(1)}s` : "Done";
        if (status === "working")  return tool ? `Working: ${tool}…` : "Working…";
        return "Thinking…";
      })();
      const color = status === "error" ? "text-err"
                  : status === "done"  ? "text-ok"
                  : "text-brand";
      const dot = status === "error" ? "bg-err"
                : status === "done"  ? "bg-ok"
                : "bg-brand pulse-dot";
      return html`
        <span class=${"inline-flex items-center gap-1.5 text-[10px] uppercase tracking-wider " + color}>
          <span class=${"inline-block w-1.5 h-1.5 rounded-full " + dot}></span>
          <span>${label}</span>
        </span>`;
    }

    /**
     * Renders one orchestrator turn (i.e. all events between turn_started
     * and turn_ended). The visible surface is:
     *   - a small "Assistant" header pill with live status
     *   - a collapsible "Thinking" panel that holds intermediate text,
     *     intermediate tool calls (read-only) and any in-flight streaming
     *     deltas before they're committed
     *   - the *final* assistant text (the "voice") rendered as a single bubble
     *   - any *generation* tool bubbles (with media) rendered below the voice
     */
    function TurnBlock({ turn, items, onUseAsInput, onCancelJob }) {
      const isActive = turn && (turn.status === "thinking" || turn.status === "working");
      // expanded by default while the turn is active; auto-collapses on done
      const [manualExpand, setManualExpand] = useState(null);
      const expanded = manualExpand == null ? isActive : manualExpand;

      // Walk through the committed messages of this turn, splitting them
      // into: (a) "voice" — the FINAL assistant text blocks, (b) "outputs"
      // — visible generation tool bubbles, and (c) "thinking" — everything
      // else (intermediate assistant text, read-only tool bubbles).
      const voiceBlocks = [];
      const outputBlocks = [];
      const thinkingItems = []; // {kind:"text"|"tool", ...}

      for (const m of items) {
        if (m.role === "assistant") {
          const blocks = m.blocks || [];
          if (m.final) {
            for (const b of blocks) {
              if (b.kind === "text") voiceBlocks.push(b);
              else if (b.kind === "tool") {
                // assistant rarely owns a "tool" block now (we emit tool
                // messages separately) but handle just in case.
                if (isVisibleToolBlock(b)) outputBlocks.push(b);
                else thinkingItems.push({ kind: "tool", block: b });
              }
            }
          } else {
            for (const b of blocks) {
              if (b.kind === "text" && b.text) {
                thinkingItems.push({ kind: "text", text: b.text });
              } else if (b.kind === "tool") {
                if (isVisibleToolBlock(b)) outputBlocks.push(b);
                else thinkingItems.push({ kind: "tool", block: b });
              }
            }
          }
        } else if (m.role === "tool") {
          for (const b of m.blocks || []) {
            if (b.kind !== "tool") continue;
            if (isVisibleToolBlock(b)) outputBlocks.push(b);
            else thinkingItems.push({ kind: "tool", block: b });
          }
        }
      }

      // If we have an in-flight streaming buffer (no message_appended yet
      // committed it), surface the partial text inside the thinking panel.
      const streamingText = turn?.streamingText || "";

      // Header summary chips
      const toolsCalled = thinkingItems.filter(x => x.kind === "tool").length
        + outputBlocks.length;
      const chips = [];
      if (toolsCalled > 0) chips.push(`called ${toolsCalled} tool${toolsCalled === 1 ? "" : "s"}`);

      const hasThinking = thinkingItems.length > 0 || streamingText;
      const showHeader = hasThinking || isActive;  // always show while active

      return html`
        <div class="flex justify-start fade-up">
          <div class="max-w-[85%] w-full space-y-2">
            ${showHeader ? html`
              <div class="flex items-center gap-2 flex-wrap">
                <${TurnStatusPill} turn=${turn} />
                ${chips.length > 0
                  ? html`<span class="text-[10px] text-txt-2">· ${chips.join(" · ")}</span>`
                  : null}
                ${hasThinking ? html`
                  <button onClick=${() => setManualExpand(!expanded)}
                    class="text-[10px] text-txt-2 hover:text-txt-0 underline decoration-dotted ml-auto">
                    ${expanded ? "hide thoughts" : "show thoughts"}
                  </button>` : null}
              </div>` : null}

            ${expanded && hasThinking ? html`
              <div class="border-l-2 border-line/60 pl-3 ml-1 space-y-2 opacity-90">
                ${thinkingItems.map((it, i) => {
                  if (it.kind === "text") {
                    return html`<div key=${"t-"+i} class="text-xs text-txt-2 italic leading-relaxed">
                      <${MarkdownBubble} text=${it.text} className="!text-xs" />
                    </div>`;
                  }
                  if (it.kind === "tool") {
                    return html`<${ToolBubble} key=${"tb-"+i} b=${it.block}
                       onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} compact=${true} />`;
                  }
                  return null;
                })}
                ${streamingText ? html`
                  <div class="text-xs text-txt-2 italic leading-relaxed">
                    <${MarkdownBubble} text=${streamingText} className="!text-xs" />
                    <span class="blink text-txt-2">▍</span>
                  </div>` : null}
              </div>` : null}

            ${voiceBlocks.length > 0 ? voiceBlocks.map((b, i) => html`
              <div key=${"v-"+i} class="bg-bg-2 border border-line rounded-2xl rounded-bl-md px-4 py-2.5 text-sm">
                <${MarkdownBubble} text=${b.text} />
              </div>`) : null}

            ${outputBlocks.map((b, i) => html`
              <${ToolBubble} key=${"o-"+i} b=${b}
                onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`)}
          </div>
        </div>`;
    }

    function SystemMessage({ m }) {
      const text = (m.blocks || []).map(b => b.text || "").join("\n");
      return html`
        <div class="flex justify-center fade-up">
          <div class=${"text-xs px-3 py-1.5 rounded-md border " +
              (m.error ? "border-err/30 bg-err/10 text-err" : "border-line bg-bg-2 text-txt-2")}>
            <${MarkdownBubble} text=${text} className="!text-xs" />
          </div>
        </div>`;
    }

    function Composer({ chat }) {
      const fileInputRef = useRef(null);
      const taRef = useRef(null);
      const [prompt, setPrompt] = useState("");
      const [mode, setMode] = useState("auto");
      const [useOrchestrator, setUseOrchestrator] = useState(true);
      const [dragOver, setDragOver] = useState(false);

      useEffect(() => {
        const onPaste = (e) => {
          for (const item of e.clipboardData?.items || []) {
            if (item.kind === "file") {
              chat.setAttachmentFromFile(item.getAsFile());
              break;
            }
          }
        };
        window.addEventListener("paste", onPaste);
        return () => window.removeEventListener("paste", onPaste);
      }, [chat]);

      const onSend = useCallback(() => {
        const p = prompt.trim();
        if (!p && !chat.pendingAttachment) return;
        chat.submit({ prompt: p, mode, useOrchestrator });
        setPrompt("");
        if (taRef.current) taRef.current.style.height = "auto";
      }, [prompt, mode, useOrchestrator, chat]);

      const onKeyDown = useCallback((e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); }
      }, [onSend]);

      const onDrop = (e) => {
        e.preventDefault(); setDragOver(false);
        const file = e.dataTransfer?.files?.[0];
        if (file) chat.setAttachmentFromFile(file);
      };

      useEffect(() => {
        if (taRef.current) {
          taRef.current.style.height = "auto";
          taRef.current.style.height = `${Math.min(taRef.current.scrollHeight, 260)}px`;
        }
      }, [prompt]);

      const orchReachable = chat.health?.orchestrator?.reachable;
      const activeJobCount = Object.keys(chat.activeJobs || {}).length;

      return html`
        <div class="border-t border-line bg-bg-1/95 backdrop-blur-md">
          <div class="max-w-3xl mx-auto px-4 py-3 space-y-2">

            ${chat.pendingAttachment ? html`
              <div class="flex items-center gap-2 bg-bg-2 border border-line rounded-lg p-2">
                ${chat.pendingAttachment.kind === "image"
                  ? html`<img src=${chat.pendingAttachment.previewUrl} class="h-12 w-12 object-cover rounded"/>`
                  : html`<video src=${chat.pendingAttachment.previewUrl} class="h-12 w-12 object-cover rounded"/>`}
                <div class="text-xs text-txt-1 flex-1 truncate">
                  <div class="font-mono truncate">${chat.pendingAttachment.name}</div>
                  <div class="text-txt-2">attached · ${chat.pendingAttachment.kind}</div>
                </div>
                <button onClick=${() => chat.setPendingAttachment(null)}
                  class="text-txt-2 hover:text-txt-0 px-2">✕</button>
              </div>` : null}

            <div class="flex items-center flex-wrap gap-1.5">
              <span class="text-[11px] text-txt-2 mr-1">Hint:</span>
              <${ModePill} value="auto" current=${mode} onClick=${() => setMode("auto")} label="Auto" sub="Let the orchestrator decide" />
              <${ModePill} value="text" current=${mode} onClick=${() => setMode("text")} label="Text" sub="Text-only response" />
              <${ModePill} value="image" current=${mode} onClick=${() => setMode("image")} label="Image" sub="Want an image as output" />
              <${ModePill} value="video" current=${mode} onClick=${() => setMode("video")} label="Video" sub="Want a video as output (slow)" />
              <${ModePill} value="understand" current=${mode} onClick=${() => setMode("understand")} label="Understand" sub="Describe / analyze attached media" />

              <div class="flex-1"></div>
              ${orchReachable ? html`
                <label class="flex items-center gap-1 text-[11px] text-txt-2 cursor-pointer">
                  <input type="checkbox" checked=${useOrchestrator}
                    onChange=${e => setUseOrchestrator(e.target.checked)}
                    class="accent-brand"/>
                  Orchestrator
                </label>` : null}
            </div>

            <div class=${classNames(
              "flex items-end gap-2 bg-bg-2 border rounded-2xl p-2",
              dragOver ? "border-brand ring-2 ring-brand/30" : "border-line"
            )}
              onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave=${() => setDragOver(false)}
              onDrop=${onDrop}>

              <button onClick=${() => fileInputRef.current?.click()}
                class="p-2 text-txt-2 hover:text-txt-0" title="Attach image or video (or drag here, or paste)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
              <input ref=${fileInputRef} type="file" class="hidden"
                accept="image/*,video/*"
                onChange=${e => { chat.setAttachmentFromFile(e.target.files?.[0]); e.target.value = ""; }} />

              <textarea ref=${taRef} value=${prompt}
                onInput=${e => setPrompt(e.target.value)}
                onKeyDown=${onKeyDown}
                placeholder=${chat.pendingAttachment
                  ? "Describe what to do with the attached media… (Shift+Enter for newline)"
                  : "Ask, generate, or describe… (Shift+Enter for newline)"}
                rows="1"
                class="flex-1 bg-transparent text-sm text-txt-0 placeholder-txt-2 outline-none resize-none px-2 py-2 leading-relaxed" />

              <button onClick=${onSend}
                disabled=${chat.busy || (!prompt.trim() && !chat.pendingAttachment)}
                class=${classNames(
                  "p-2 rounded-xl transition-colors",
                  chat.busy || (!prompt.trim() && !chat.pendingAttachment)
                    ? "bg-bg-3 text-txt-2 cursor-not-allowed"
                    : "bg-brand text-bg-0 hover:bg-brand2 hover:text-txt-0"
                )}>
                ${chat.busy ? html`
                  <svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" stroke-opacity="0.3"/>
                    <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                  </svg>`
                  : html`
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>`}
              </button>
            </div>

            <div class="text-[10px] text-txt-2 px-2 flex items-center flex-wrap gap-2">
              <span>Enter to send · Shift+Enter for newline · drag-and-drop or paste files</span>
              ${activeJobCount > 0 ? html`<span class="text-info">· ${activeJobCount} job${activeJobCount === 1 ? "" : "s"} running in background — chat away</span>` : null}
              ${!orchReachable && chat.health ? html`<span class="text-warn">· orchestrator offline → using Lance-native dispatch</span>` : null}
            </div>
          </div>
        </div>`;
    }

    function EmptyState({ orchOk, onPick }) {
      const ideas = orchOk
        ? [
            { icon: "🖼", label: "Draw a cinematic shot of a desert at golden hour, ultrawide", mode: "auto" },
            { icon: "🎬", label: "Generate a 3-second video of a pastel hot-air balloon over snowy peaks", mode: "auto" },
            { icon: "💬", label: "What can you do?", mode: "auto" },
            { icon: "🔎", label: "Attach an image and ask 'what is this?'", mode: "auto" },
          ]
        : [
            { icon: "🖼", label: "Draw a cinematic shot of a desert at golden hour", mode: "image" },
            { icon: "🎬", label: "A pastel hot-air balloon drifting over snowy peaks", mode: "video" },
            { icon: "🔎", label: "Describe what you see (attach an image first)", mode: "understand" },
            { icon: "✏️", label: "Make it night-time with neon lights (attach an image)", mode: "image" },
          ];
      return html`
        <div class="h-full flex flex-col items-center justify-center text-center px-6">
          <div class="w-24 h-24 rounded-full overflow-hidden border border-brand/30 ring-2 ring-brand/20 shadow-lg mb-4">
            <img src="/static/img/avatar-icon.png" alt="Lance avatar"
                 class="w-full h-full object-cover" />
          </div>
          <h1 class="text-2xl font-semibold text-txt-0 mb-1">Lance Assistant</h1>
          <p class="text-sm text-txt-2 mb-2 max-w-md">
            A unified multimodal model — generate images and video, edit either,
            and reason about media you attach.
          </p>
          <p class="text-[11px] text-txt-2 mb-8 max-w-md">
            ${orchOk
              ? "Driven by your local orchestrator VLM. It chats with you and calls Lance whenever you need new pixels."
              : "Orchestrator offline — falling back to Lance-native dispatch. Pick a mode pill to choose the task explicitly."}
          </p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2 w-full max-w-2xl">
            ${ideas.map(i => html`
              <button onClick=${() => onPick(i)}
                class="text-left px-4 py-3 rounded-xl border border-line bg-bg-2 hover:bg-bg-3 transition-colors">
                <span class="mr-2">${i.icon}</span>
                <span class="text-sm text-txt-1">${i.label}</span>
              </button>`)}
          </div>
        </div>`;
    }

    function ActiveJobsBanner({ activeJobs, onCancel }) {
      const items = Object.values(activeJobs || {});
      if (items.length === 0) return null;
      return html`
        <div class="max-w-3xl mx-auto px-4 pt-3">
          <div class="rounded-lg border border-info/30 bg-info/5 p-2 text-[11px] text-txt-1">
            <div class="text-txt-2 uppercase tracking-wider text-[10px] mb-1">
              ${items.length} background job${items.length === 1 ? "" : "s"} running — you can keep chatting
            </div>
            ${items.map(j => html`
              <div class="flex items-center gap-2 py-0.5">
                <span class=${"inline-block w-1.5 h-1.5 rounded-full " +
                    (j.status === "running" ? "bg-info pulse-dot" : "bg-warn pulse-dot")}></span>
                <span class="text-txt-1">${TOOL_LABEL[j.tool] || j.tool}</span>
                ${j.prompt ? html`<span class="text-txt-2 truncate italic">"${(j.prompt || "").slice(0, 60)}"</span>` : null}
                <span class="font-mono text-[10px] text-txt-2 ml-auto">${(j.job_id || "").slice(0, 10)}</span>
                <button onClick=${() => onCancel(j.job_id)}
                  class="text-[10px] px-1.5 py-0.5 rounded border border-line bg-bg-2 hover:bg-bg-3">
                  cancel
                </button>
              </div>`)}
          </div>
        </div>`;
    }

    function App() {
      const chat = useChat();
      const scrollRef = useRef(null);    // the overflow-y-auto viewport
      const contentRef = useRef(null);   // the inner growing content
      // Stick to the bottom by default. Flipped off when the user scrolls
      // up themselves, flipped back on when they scroll back near bottom.
      // We keep this in a ref (not state) so the ResizeObserver callback
      // can read the latest value without re-creating itself.
      const pinnedRef = useRef(true);
      const [showJumpToLatest, setShowJumpToLatest] = useState(false);

      // Detect user-driven scroll changes so streaming/reflection updates
      // don't yank them out of mid-history review.
      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;
        const onScroll = () => {
          const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
          pinnedRef.current = nearBottom;
          setShowJumpToLatest(!nearBottom);
        };
        el.addEventListener("scroll", onScroll, { passive: true });
        return () => el.removeEventListener("scroll", onScroll);
      }, []);

      // React to ANY size change of the message content — committed
      // messages, streaming "thinking" text, expanded thought panels,
      // images finishing their layout pass, post-job reflection bubbles —
      // and keep the viewport pinned to the bottom unless the user
      // intentionally scrolled up.
      useEffect(() => {
        const el = scrollRef.current;
        const content = contentRef.current;
        if (!el || !content) return;
        const scrollToBottom = () => {
          el.scrollTop = el.scrollHeight;
        };
        const ro = new ResizeObserver(() => {
          if (pinnedRef.current) scrollToBottom();
        });
        ro.observe(content);
        // Late-loading <img> elements (the chat is image-heavy) finish
        // their first layout pass after the ResizeObserver has already
        // fired for the surrounding container — listen for image loads
        // and re-pin if needed.
        const onLoad = (e) => {
          if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "VIDEO")) {
            if (pinnedRef.current) scrollToBottom();
          }
        };
        content.addEventListener("load", onLoad, true);
        return () => {
          ro.disconnect();
          content.removeEventListener("load", onLoad, true);
        };
      }, []);

      const jumpToLatest = useCallback(() => {
        const el = scrollRef.current;
        if (!el) return;
        el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
        pinnedRef.current = true;
        setShowJumpToLatest(false);
      }, []);

      const onUseAsInput = useCallback((toolBlock) => {
        if (!toolBlock.media_url) return;
        chat.reattachFromUrl(toolBlock.media_url, toolBlock.media_filename, toolBlock.kind_inner);
      }, [chat]);

      const onCancelJob = useCallback((jobId) => { chat.cancelJob(jobId); }, [chat]);

      const orchOk = chat.health?.orchestrator?.reachable;

      // Group messages into rendering units: user/system messages stand
      // alone, and consecutive assistant/tool messages that share a
      // turn_id collapse into a single TurnBlock (with a collapsible
      // thinking panel). Any currently active turn with no committed
      // messages yet still gets a stub block so the user sees the
      // "Thinking…" indicator immediately on send.
      const groups = useMemo(() => {
        const out = [];
        const idxByTurn = {};
        for (const m of chat.messages) {
          if (m.role === "user") {
            out.push({ kind: "user", message: m });
            continue;
          }
          if (m.role === "system") {
            out.push({ kind: "system", message: m });
            continue;
          }
          if (m.role === "assistant" || m.role === "tool") {
            const tid = m.turn_id || `_orphan-${m.id}`;
            if (idxByTurn[tid] == null) {
              idxByTurn[tid] = out.length;
              out.push({ kind: "turn", turn_id: tid, items: [m] });
            } else {
              out[idxByTurn[tid]].items.push(m);
            }
            continue;
          }
        }
        // Surface any active turn that hasn't produced a committed
        // message yet — that gives us a live "Thinking…" pill.
        for (const [tid, t] of Object.entries(chat.turns || {})) {
          if (idxByTurn[tid] != null) continue;
          if (t && (t.status === "thinking" || t.status === "working")) {
            out.push({ kind: "turn", turn_id: tid, items: [] });
          }
        }
        return out;
      }, [chat.messages, chat.turns]);

      return html`
        <div class="h-full flex flex-col">
          <!-- Header -->
          <div class="border-b border-line bg-bg-1/95 backdrop-blur">
            <div class="max-w-3xl mx-auto px-4 py-2.5 flex items-center gap-2">
              <div class="w-7 h-7 rounded-lg bg-brand/20 border border-brand/30 flex items-center justify-center shrink-0">
                <span class="text-sm">🪶</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-txt-0 truncate">Lance Assistant</div>
                <div class="text-[11px] text-txt-2 truncate">
                  ${orchOk
                    ? html`<span>via <span class="font-mono">${chat.health.orchestrator.model}</span></span>`
                    : html`<span>ByteDance Lance · 3B unified multimodal</span>`}
                </div>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <${ContextBadge} ctx=${chat.context} />
                <button onClick=${chat.newChat}
                  class="text-[11px] text-txt-2 hover:text-txt-0 px-2 py-1 border border-line rounded-md hover:bg-bg-3 whitespace-nowrap">
                  New chat
                </button>
                <${HealthPill} info=${chat.health} onReprobe=${chat.reprobeOrchestrator} />
              </div>
            </div>
          </div>

          <${ActiveJobsBanner} activeJobs=${chat.activeJobs} onCancel=${onCancelJob} />

          <!-- Messages -->
          <div ref=${scrollRef} class="flex-1 overflow-y-auto relative">
            <div ref=${contentRef} class="max-w-3xl mx-auto px-4 py-6 space-y-4 min-h-full">
              ${groups.length === 0
                ? html`<${EmptyState} orchOk=${orchOk} onPick=${(idea) => {
                    chat.submit({ prompt: idea.label, mode: idea.mode, useOrchestrator: orchOk });
                  }} />`
                : groups.map((g, gi) => {
                    if (g.kind === "user") {
                      return html`<${UserMessage} key=${g.message.id} m=${g.message} captions=${chat.captions} />`;
                    }
                    if (g.kind === "system") {
                      return html`<${SystemMessage} key=${g.message.id} m=${g.message} />`;
                    }
                    if (g.kind === "turn") {
                      const turn = chat.turns?.[g.turn_id];
                      return html`<${TurnBlock} key=${"turn-"+g.turn_id+"-"+gi}
                        turn=${turn} items=${g.items}
                        onUseAsInput=${onUseAsInput} onCancelJob=${onCancelJob} />`;
                    }
                    return null;
                  })}
            </div>
            ${showJumpToLatest ? html`
              <button onClick=${jumpToLatest}
                class="sticky bottom-3 left-1/2 -translate-x-1/2 px-3 py-1.5 rounded-full
                       bg-bg-2/95 border border-line text-[11px] text-txt-1 hover:text-txt-0
                       hover:bg-bg-3 backdrop-blur shadow-lg flex items-center gap-1.5 z-10"
                style="display: inline-flex;">
                <span>↓</span> jump to latest
              </button>` : null}
          </div>

          <${Composer} chat=${chat} />
        </div>`;
    }

    render(html`<${App} />`, document.getElementById("root"));
  </script>
</body>
</html>
